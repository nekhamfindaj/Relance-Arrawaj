<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Relance Clients — Fondation Arrawaj</title>
<script src="./xlsx.full.min.js"></script>
<script src="./chart.umd.js"></script>
<script src="./msal-browser.min.js"></script>
<style>
:root{
  --vert:#0b3d2e; --vert-clair:#12563f; --orange:#e8813a; --orange-fonce:#c9691f;
  --bg:#f3f2ec; --carte:#ffffff; --texte:#1a201c; --texte-att:#5e685f; --ligne:#e6e4da;
  --rouge:#b3432f; --jaune:#c99a2e; --radius:12px; --radius-sm:8px;
  --ombre-sm:0 1px 2px rgba(15,25,20,.05), 0 1px 1px rgba(15,25,20,.04);
  --ombre-md:0 4px 14px -4px rgba(15,25,20,.10), 0 2px 6px -2px rgba(15,25,20,.06);
  --ombre-lg:0 20px 45px -15px rgba(7,42,31,.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--texte);
  line-height:1.45;letter-spacing:-.005em;}
#app{min-height:100vh;display:flex;flex-direction:column;}
:focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:4px;}

/* --- Login --- */
#ecran-login{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(circle at 15% 15%, #12563f 0%, #0b3d2e 45%, #072a1f 100%);}
.login-panel{background:var(--carte);border-radius:22px;overflow:hidden;max-width:820px;width:100%;
  display:flex;box-shadow:var(--ombre-lg);}
.login-brand{flex:1.1;background:linear-gradient(160deg, var(--vert) 0%, #072a1f 100%);
  color:#fff;padding:44px 36px;display:flex;flex-direction:column;gap:18px;position:relative;overflow:hidden;}
.login-brand::after{content:"";position:absolute;right:-60px;bottom:-60px;width:220px;height:220px;
  border-radius:50%;border:1px solid rgba(255,255,255,.08);}
.login-brand::before{content:"";position:absolute;right:-20px;bottom:-20px;width:140px;height:140px;
  border-radius:50%;border:1px solid rgba(255,255,255,.1);}
.login-badge{width:54px;height:54px;border-radius:15px;background:rgba(255,255,255,.95);
  display:flex;align-items:center;justify-content:center;color:var(--orange);box-shadow:var(--ombre-md);}
.login-eyebrow{font-size:.7rem;letter-spacing:.14em;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;}
.login-brand h1{font-size:1.55rem;font-weight:700;margin:0;line-height:1.2;letter-spacing:-.01em;}
.login-tagline{font-size:.88rem;color:rgba(255,255,255,.78);line-height:1.6;max-width:32ch;}
.login-features{list-style:none;display:flex;flex-direction:column;gap:11px;margin-top:auto;padding-top:14px;}
.login-features li{font-size:.82rem;color:rgba(255,255,255,.88);display:flex;align-items:center;gap:10px;}
.login-features li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.login-action{flex:1;padding:44px 36px;display:flex;flex-direction:column;justify-content:center;gap:16px;}
.login-instruction{font-size:.94rem;color:var(--texte);font-weight:600;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;}
.login-note{font-size:.76rem;color:var(--texte-att);line-height:1.55;}
.login-loading{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--texte-att);}
.spinner{width:16px;height:16px;border:2px solid var(--ligne);border-top-color:var(--vert);border-radius:50%;
  animation:tourner .7s linear infinite;flex-shrink:0;}
@keyframes tourner{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion: reduce){.spinner{animation:none;}}
@media (max-width:640px){
  .login-panel{flex-direction:column;max-width:420px;}
  .login-brand{padding:32px 26px;}
  .login-action{padding:32px 26px;}
  .login-features{display:none;}
}

.btn{background:var(--vert);color:#fff;border:none;padding:12px 24px;border-radius:var(--radius-sm);
  font-size:1rem;cursor:pointer;font-weight:600;transition:background .15s ease,transform .1s ease,box-shadow .15s ease;
  box-shadow:var(--ombre-sm);}
.btn:hover{background:var(--vert-clair);box-shadow:var(--ombre-md);}
.btn:active{transform:translateY(1px);}
.btn.orange{background:var(--orange);}
.btn.orange:hover{background:var(--orange-fonce);}
.btn.discret{background:transparent;color:var(--vert);border:1px solid var(--ligne);box-shadow:none;}
.btn.discret:hover{background:var(--bg);box-shadow:none;}
.btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;}

/* --- Header --- */
header{background:linear-gradient(135deg, var(--vert) 0%, #0e4936 100%);color:#fff;padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.12);
  position:sticky;top:0;z-index:10;}
header .titre{font-weight:700;font-size:1.05rem;display:flex;align-items:center;letter-spacing:-.01em;}
header .role-badge{background:var(--orange);color:#fff;font-size:.7rem;padding:3px 10px;border-radius:20px;
  margin-left:8px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
header .user-info{display:flex;align-items:center;gap:10px;font-size:.85rem;}
header .btn-deco{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.35);color:#fff;
  padding:6px 12px;border-radius:8px;font-size:.8rem;cursor:pointer;transition:background .15s ease;}
header .btn-deco:hover{background:rgba(255,255,255,.18);}

main{flex:1;padding:18px 16px 32px;max-width:1100px;width:100%;margin:0 auto;}

/* --- Cartes / listes --- */
.carte{background:var(--carte);border:1px solid var(--ligne);border-radius:var(--radius);padding:18px;
  margin-bottom:16px;box-shadow:var(--ombre-sm);}
.carte h2{font-size:1rem;color:var(--vert);margin-bottom:12px;font-weight:700;letter-spacing:-.005em;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px;}
.stat{background:var(--carte);border:1px solid var(--ligne);border-left:3px solid var(--orange);
  border-radius:var(--radius-sm);padding:14px;text-align:center;box-shadow:var(--ombre-sm);
  transition:box-shadow .15s ease,transform .15s ease;}
.stat:hover{box-shadow:var(--ombre-md);transform:translateY(-1px);}
.stat .valeur{font-size:1.6rem;font-weight:700;color:var(--vert);letter-spacing:-.02em;}
.stat .label{font-size:.71rem;color:var(--texte-att);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

.client-item{border:1px solid var(--ligne);border-radius:var(--radius-sm);padding:13px;margin-bottom:9px;
  display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:var(--carte);
  box-shadow:var(--ombre-sm);transition:box-shadow .15s ease,border-color .15s ease;}
.client-item:hover{box-shadow:var(--ombre-md);border-color:#d5d3c6;}
.client-item .nom{font-weight:700;letter-spacing:-.005em;}
.client-item .meta{font-size:.78rem;color:var(--texte-att);margin-top:2px;}
.badge{font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.badge.att{background:#fff2e0;color:var(--orange-fonce);}
.badge.rdv{background:#e5f2ea;color:var(--vert);}
.badge.rappel{background:#fdf6e0;color:var(--jaune);}

input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--ligne);border-radius:var(--radius-sm);
  font-size:.9rem;margin-bottom:9px;background:var(--carte);color:var(--texte);
  transition:border-color .15s ease,box-shadow .15s ease;font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--vert);box-shadow:0 0 0 3px rgba(11,61,46,.1);}
label{font-size:.79rem;color:var(--texte-att);font-weight:700;display:block;margin-bottom:5px;letter-spacing:-.005em;}
.tel-link{color:var(--orange-fonce);font-weight:700;text-decoration:none;}
.tel-link:hover{text-decoration:underline;}

/* --- Formulaire de saisie appel --- */
.etapes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.etapes button{flex:1;min-width:130px;padding:11px;border:1px solid var(--ligne);background:#fff;
  border-radius:var(--radius-sm);cursor:pointer;font-size:.85rem;font-weight:600;color:var(--texte);
  transition:all .15s ease;}
.etapes button:hover{border-color:var(--vert-clair);}
.etapes button.actif{background:var(--vert);color:#fff;border-color:var(--vert);box-shadow:var(--ombre-sm);}
.zone-detail{border-top:1px dashed var(--ligne);margin-top:10px;padding-top:10px;}
.hidden{display:none !important;}

/* --- Nav rôle --- */
nav.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--ligne);overflow-x:auto;}
nav.tabs button{background:none;border:none;padding:10px 14px;font-size:.87rem;color:var(--texte-att);
  cursor:pointer;border-bottom:3px solid transparent;font-weight:600;white-space:nowrap;transition:color .15s ease;}
nav.tabs button:hover{color:var(--vert);}
nav.tabs button.actif{color:var(--vert);border-bottom-color:var(--orange);}

.msg-vide{text-align:center;color:var(--texte-att);padding:34px 20px;font-size:.9rem;}
.msg-erreur{background:#fdeceb;color:var(--rouge);padding:11px 14px;border-radius:var(--radius-sm);font-size:.85rem;margin-bottom:10px;border:1px solid #f6d2ce;}
.msg-succes{background:#e5f2ea;color:var(--vert);padding:11px 14px;border-radius:var(--radius-sm);font-size:.85rem;margin-bottom:10px;border:1px solid #cbe6d5;}

/* --- Tableaux --- */
.tableau-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--ligne);}
table.donnees{width:100%;border-collapse:collapse;font-size:.82rem;}
table.donnees thead th{text-align:left;padding:10px 12px;background:var(--bg);color:var(--texte-att);
  font-weight:700;text-transform:uppercase;font-size:.7rem;letter-spacing:.04em;border-bottom:2px solid var(--ligne);
  position:sticky;top:0;}
table.donnees tbody td{padding:9px 12px;border-bottom:1px solid var(--ligne);}
table.donnees tbody tr:last-child td{border-bottom:none;}
table.donnees tbody tr:nth-child(even){background:rgba(11,61,46,.02);}
table.donnees tbody tr:hover{background:rgba(232,129,58,.06);}

/* --- Fiche client segmentée --- */
.fiche-client{border:1px solid var(--ligne);border-radius:var(--radius-sm);margin-bottom:14px;overflow:hidden;background:var(--carte);}
.fiche-section{padding:12px 14px;border-bottom:1px solid var(--ligne);background:var(--bg);}
.fiche-section:last-child{border-bottom:none;}
.fiche-section-credit{background:#eef5f1;}
.fiche-titre{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:var(--orange-fonce);margin-bottom:9px;}
.fiche-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:9px 18px;}
.fiche-item{display:flex;flex-direction:column;gap:2px;min-width:0;}
.fiche-label{font-size:.68rem;color:var(--texte-att);}
.fiche-valeur{font-size:.85rem;font-weight:700;color:var(--texte);overflow-wrap:break-word;}
.fiche-valeur.fiche-accent{color:var(--vert);font-size:1rem;}

/* --- Arbre de situation --- */
.arbre{list-style:none;}
.arbre ul{list-style:none;margin-top:6px;padding-left:20px;border-left:2px solid var(--ligne);}
.arbre li{position:relative;padding:5px 0 5px 18px;}
.arbre li::before{content:"";position:absolute;left:0;top:19px;width:14px;height:2px;background:var(--ligne);}
.noeud{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  background:var(--carte);border:1px solid var(--ligne);border-radius:var(--radius-sm);padding:9px 12px;
  box-shadow:var(--ombre-sm);}
.noeud-gauche{display:flex;align-items:center;gap:8px;}
.noeud-puce{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.noeud-puce.neutre{background:var(--texte-att);}
.noeud-puce.positif{background:var(--vert);}
.noeud-puce.negatif{background:var(--rouge);}
.noeud-puce.attente{background:var(--jaune);}
.noeud-label{font-size:.85rem;font-weight:700;color:var(--texte);}
.noeud-droite{display:flex;align-items:baseline;gap:6px;}
.noeud-valeur{font-size:.95rem;font-weight:700;color:var(--vert);}
.noeud-pct{font-size:.72rem;color:var(--texte-att);font-weight:600;}

</style>
</head>
<body>
<div id="app">
  <div id="ecran-login">
    <div class="login-panel">
      <div class="login-brand">
        <div class="login-badge">
          <img src="./logo-emblem.png" alt="Fondation Arrawaj" width="34" height="34">
        </div>
        <div>
          <div class="login-eyebrow">Fondation Arrawaj</div>
          <h1>Relance Clients</h1>
        </div>
        <p class="login-tagline">La plateforme de suivi des campagnes de relance, de l'appel jusqu'au rendez-vous confirmé en agence.</p>
        <ul class="login-features">
          <li>File d'appel priorisée automatiquement</li>
          <li>Suivi en temps réel par opérateur</li>
          <li>Transmission des RDV en un clic</li>
        </ul>
      </div>
      <div class="login-action">
        <div id="login-zone-action">
          <div class="login-loading"><div class="spinner"></div>Vérification de votre session...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG — à ajuster une fois les tables Dataverse créées
   ============================================================ */
const MSAL_CONFIG = {
  auth: {
    clientId: "725c7e66-a235-4672-b09d-3eede78c1b1c",       // App CGA Arrawaj réutilisée
    authority: "https://login.microsoftonline.com/93d6c57e-29a2-4b04-847c-6915c6a388a0",
    redirectUri: "https://nekhamfindaj.github.io/Relance-Arrawaj/"
  },
  cache: { cacheLocation: "sessionStorage" }
};
const DATAVERSE_URL = "https://org18dd8097.crm4.dynamics.com";
const DATAVERSE_SCOPE = `${DATAVERSE_URL}/.default`;

// ⚠️ Noms de tables à confirmer après création manuelle dans Power Apps
// (le nom pluriel exact dépend de la règle de pluralisation Dataverse — à vérifier dans "Détails de la table")
const TABLES = {
  clients: "cr2c5_arw_relance_clientses",
  appels: "cr2c5_arw_appelses",
  users: "cr2c5_arw_userses",
  motifs: "cr2c5_arw_motifses" // ⚠️ à confirmer une fois la table créée (voir instructions)
};

/* ============================================================
   AUTH MSAL
   ============================================================ */
const msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
let currentAccount = null;
let currentUser = null; // { email, nom, role, agence }

async function initAuth() {
  try {
    const resp = await Promise.race([
      msalInstance.handleRedirectPromise(),
      new Promise(res => setTimeout(() => res(null), 2000))
    ]);
    if (resp && resp.account) currentAccount = resp.account;
  } catch (e) { console.error("Erreur redirect MSAL:", e); }

  const accounts = msalInstance.getAllAccounts();
  if (!currentAccount && accounts.length > 0) currentAccount = accounts[0];

  if (currentAccount) {
    await chargerProfilUtilisateur();
  } else {
    const zone = document.getElementById("login-zone-action");
    zone.innerHTML = `
      <img src="./logo-arrawaj.png" alt="Fondation Arrawaj" style="height:32px;width:auto;margin-bottom:6px;object-fit:contain;">
      <p class="login-instruction">Connectez-vous avec votre compte professionnel</p>
      <button class="btn login-btn" id="btn-login">
        <svg width="17" height="17" viewBox="0 0 23 23"><rect width="10" height="10" x="1" y="1" fill="#f35325"/><rect width="10" height="10" x="12" y="1" fill="#81bc06"/><rect width="10" height="10" x="1" y="12" fill="#05a6f0"/><rect width="10" height="10" x="12" y="12" fill="#ffba08"/></svg>
        Se connecter avec Microsoft
      </button>
      <p class="login-note">Accès réservé au personnel autorisé de la Fondation Arrawaj</p>
    `;
    document.getElementById("btn-login").addEventListener("click", () => {
      msalInstance.loginRedirect({ scopes: [DATAVERSE_SCOPE] });
    });
  }
}

async function getToken() {
  const req = { scopes: [DATAVERSE_SCOPE], account: currentAccount };
  try {
    const res = await msalInstance.acquireTokenSilent(req);
    return res.accessToken;
  } catch (e) {
    const res = await msalInstance.acquireTokenRedirect(req);
    return null; // redirection en cours
  }
}

async function getGraphToken() {
  const req = { scopes: ["User.ReadBasic.All"], account: currentAccount };
  try {
    const res = await msalInstance.acquireTokenSilent(req);
    return res.accessToken;
  } catch (e) {
    const res = await msalInstance.acquireTokenRedirect(req);
    return null; // redirection en cours
  }
}

async function rechercherUtilisateursM365(query) {
  const token = await getGraphToken();
  const url = `https://graph.microsoft.com/v1.0/users?$search="displayName:${encodeURIComponent(query)}"&$select=displayName,mail,userPrincipalName&$top=8`;
  const res = await fetch(url, {
    headers: {
      "Authorization": `Bearer ${token}`,
      "ConsistencyLevel": "eventual"
    }
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Graph ${res.status}: ${txt.slice(0, 200)}`);
  }
  const data = await res.json();
  return data.value || [];
}

async function dvFetch(path, options = {}) {
  const token = await getToken();
  const res = await fetch(`${DATAVERSE_URL}/api/data/v9.2/${path}`, {
    ...options,
    headers: {
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json",
      "OData-MaxVersion": "4.0",
      "OData-Version": "4.0",
      "Accept": "application/json",
      "Prefer": "odata.maxpagesize=500",
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Dataverse ${res.status}: ${txt.slice(0,200)}`);
  }
  return res.status === 204 ? null : res.json();
}

async function chargerProfilUtilisateur() {
  try {
    const email = currentAccount.username.toLowerCase();
    const data = await dvFetch(`${TABLES.users}?$filter=cr2c5_arw_email eq '${email}'`);
    if (!data.value || data.value.length === 0) {
      afficherErreurProfil(email);
      return;
    }
    const u = data.value[0];
    const roles = { 0: "admin", 1: "crc", 2: "dr", 3: "rga", 4: "ca" };
    currentUser = {
      id: u.cr2c5_arw_usersid,
      email: u.cr2c5_arw_email,
      nom: u.cr2c5_arw_nom,
      role: roles[u.cr2c5_arw_role] || "crc",
      agence: u.cr2c5_arw_agence,
      direction: u.cr2c5_arw_direction,
      quota: u.cr2c5_arw_quota_jour
    };
    demarrerApp();
  } catch (e) {
    console.error(e);
    afficherErreurProfil(currentAccount.username);
  }
}

function afficherErreurProfil(email) {
  document.getElementById("app").innerHTML = `
    <div id="ecran-login">
      <div class="login-panel">
        <div class="login-brand">
          <div class="login-badge">
            <img src="./logo-emblem.png" alt="Fondation Arrawaj" width="34" height="34">
          </div>
          <div>
            <div class="login-eyebrow">Fondation Arrawaj</div>
            <h1>Relance Clients</h1>
          </div>
          <p class="login-tagline">La plateforme de suivi des campagnes de relance, de l'appel jusqu'au rendez-vous confirmé en agence.</p>
        </div>
        <div class="login-action">
          <p class="login-instruction">Profil introuvable</p>
          <p class="login-note">Aucun utilisateur trouvé pour <strong>${email}</strong> dans la table des utilisateurs.<br>Contactez l'administrateur pour être ajouté.</p>
          <button class="btn discret" onclick="location.reload()">Réessayer</button>
        </div>
      </div>
    </div>`;
}

/* ============================================================
   DÉMARRAGE APP — routage par rôle
   ============================================================ */
function demarrerApp() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div class="titre"><img src="./logo-emblem.png" alt="" width="22" height="22" style="vertical-align:-5px;margin-right:6px;">Relance Clients <span class="role-badge">${currentUser.role}</span></div>
      <div class="user-info">
        <span>${currentUser.nom}</span>
        <button class="btn-deco" id="btn-logout">Déconnexion</button>
      </div>
    </header>
    <main id="zone-principale"></main>
  `;
  document.getElementById("btn-logout").addEventListener("click", () => msalInstance.logoutRedirect());

  const zone = document.getElementById("zone-principale");
  if (currentUser.role === "crc") renderEcranCRC(zone);
  else if (currentUser.role === "admin") renderEcranAdmin(zone);
  else if (currentUser.role === "dr") renderEcranDR(zone);
  else renderEcranBientot(zone);
}

function renderEcranBientot(zone) {
  zone.innerHTML = `<div class="msg-vide">Écran ${currentUser.role.toUpperCase()} — bientôt disponible (phase 2).</div>`;
}

/* ============================================================
   ÉCRAN CRC — file du jour + recherche + saisie appel
   ============================================================ */
async function renderEcranCRC(zone) {
  zone.innerHTML = `
    <div id="tdb-crc"></div>
    <nav class="tabs">
      <button class="actif" data-tab="file">Ma file du jour</button>
      <button data-tab="recherche">Recherche libre</button>
    </nav>
    <div id="contenu-crc"></div>
  `;
  chargerTDBCRC(document.getElementById("tdb-crc"));
  const contenu = document.getElementById("contenu-crc");
  const tabs = zone.querySelectorAll("nav.tabs button");
  tabs.forEach(b => b.addEventListener("click", () => {
    tabs.forEach(x => x.classList.remove("actif"));
    b.classList.add("actif");
    if (b.dataset.tab === "file") chargerFileDuJour(contenu);
    else chargerRecherche(contenu);
  }));
  chargerFileDuJour(contenu);
}

async function chargerTDBCRC(container) {
  container.innerHTML = `<div class="msg-vide">Chargement du tableau de bord...</div>`;
  const debutJour = new Date(); debutJour.setHours(0, 0, 0, 0);
  const debutJourISO = debutJour.toISOString();
  try {
    const [enFileData, appelsJourData, rdvJourData] = await Promise.all([
      dvFetch(`${TABLES.clients}?$filter=_cr2c5_arw_operateur_assigne_value eq ${currentUser.id} and cr2c5_arw_statut eq 11&$select=cr2c5_arw_relance_clientsid`),
      dvFetch(`${TABLES.appels}?$filter=cr2c5_arw_operateur eq '${currentUser.nom}' and cr2c5_arw_date_appel ge ${debutJourISO}&$select=cr2c5_arw_nature_appel,cr2c5_arw_resultat_argumente`),
      dvFetch(`${TABLES.clients}?$filter=_cr2c5_arw_operateur_assigne_value eq ${currentUser.id} and cr2c5_arw_statut eq 16&$select=cr2c5_arw_relance_clientsid`)
    ]);
    const enFile = enFileData.value?.length || 0;
    const appelsJour = appelsJourData.value || [];
    const traites = appelsJour.length;
    const argumentes = appelsJour.filter(a => a.cr2c5_arw_nature_appel === 100).length;
    const rdvJour = rdvJourData.value?.length || 0;
    const quota = currentUser.quota || 0;
    const reste = quota > 0 ? Math.max(quota - traites, 0) : enFile;
    const tauxArgumente = traites > 0 ? Math.round((argumentes / traites) * 100) : 0;
    const tauxConfirmation = argumentes > 0 ? Math.round((rdvJour / argumentes) * 100) : 0;
    container.innerHTML = `
      <div class="stat-grid">
        <div class="stat"><div class="valeur">${enFile}</div><div class="label">En file actuellement</div></div>
        <div class="stat"><div class="valeur">${traites}</div><div class="label">Traités aujourd'hui</div></div>
        <div class="stat"><div class="valeur">${reste}</div><div class="label">Reste à faire</div></div>
        <div class="stat"><div class="valeur">${tauxArgumente}%</div><div class="label">Taux argumenté</div></div>
        <div class="stat"><div class="valeur">${rdvJour}</div><div class="label">RDV fixés (jour)</div></div>
        <div class="stat"><div class="valeur">${tauxConfirmation}%</div><div class="label">Taux de confirmation RDV</div></div>
      </div>
    `;
  } catch (e) {
    container.innerHTML = `<div class="msg-erreur">Erreur tableau de bord : ${e.message}</div>`;
  }
}

async function chargerFileDuJour(contenu) {
  contenu.innerHTML = `<div class="msg-vide">Chargement de votre file...</div>`;
  const filtre = `_cr2c5_arw_operateur_assigne_value eq ${currentUser.id} and cr2c5_arw_statut eq 11`; // ATTRIBUE
  try {
    let data = await dvFetch(`${TABLES.clients}?$filter=${encodeURIComponent(filtre)}&$orderby=cr2c5_arw_finecheance asc`);
    let liste = data.value || [];
    const quota = currentUser.quota || 20;

    if (liste.length < quota) {
      contenu.innerHTML = `<div class="msg-vide">Attribution automatique des prochains clients...</div>`;
      const aTirer = quota - liste.length;
      const nouveaux = await fetchProchainsClientsPrioritaires(aTirer);
      if (nouveaux.length > 0) {
        await assignerClientsAMoi(nouveaux);
        data = await dvFetch(`${TABLES.clients}?$filter=${encodeURIComponent(filtre)}&$orderby=cr2c5_arw_finecheance asc`);
        liste = data.value || [];
      }
    }

    if (liste.length === 0) {
      contenu.innerHTML = `<div class="msg-vide">Aucun client disponible dans le pool actuellement.</div>`;
      return;
    }
    contenu.innerHTML = liste.map(c => templateClientItem(c)).join("");
    attacherEcoutesFiche(contenu, liste);
  } catch (e) {
    contenu.innerHTML = `<div class="msg-erreur">Erreur de chargement : ${e.message}</div>`;
  }
}

/* Moteur de priorité : 1) rappels programmés aujourd'hui, 2) nouveaux appels (prêt actif,
   trié par échéance proche + montant élevé), 3) nouveaux appels sur prêts déjà clôturés */
async function fetchProchainsClientsPrioritaires(limite) {
  const todayStr = new Date().toISOString().slice(0, 10);
  let resultats = [];

  const t1 = await dvFetch(`${TABLES.clients}?$filter=(cr2c5_arw_statut eq 15 or cr2c5_arw_statut eq 12) and cr2c5_arw_date_rappel_prevue eq ${todayStr}&$orderby=cr2c5_arw_finecheance asc,cr2c5_arw_montantdeblocage desc&$top=${limite}`);
  resultats = resultats.concat(t1.value || []);

  if (resultats.length < limite) {
    const reste = limite - resultats.length;
    const t2 = await dvFetch(`${TABLES.clients}?$filter=cr2c5_arw_statut eq 10 and cr2c5_arw_finecheance ge ${todayStr}&$orderby=cr2c5_arw_finecheance asc,cr2c5_arw_montantdeblocage desc&$top=${reste}`);
    resultats = resultats.concat(t2.value || []);
  }

  if (resultats.length < limite) {
    const reste = limite - resultats.length;
    const t3 = await dvFetch(`${TABLES.clients}?$filter=cr2c5_arw_statut eq 10 and cr2c5_arw_finecheance lt ${todayStr}&$orderby=cr2c5_arw_montantdeblocage desc&$top=${reste}`);
    resultats = resultats.concat(t3.value || []);
  }

  return resultats.slice(0, limite);
}

async function assignerClientsAMoi(clients) {
  for (const c of clients) {
    await dvFetch(`${TABLES.clients}(${c.cr2c5_arw_relance_clientsid})`, {
      method: "PATCH",
      body: JSON.stringify({
        "cr2c5_arw_operateur_assigne@odata.bind": `/${TABLES.users}(${currentUser.id})`,
        cr2c5_arw_statut: 11,
        cr2c5_arw_date_attribution: new Date().toISOString()
      })
    });
  }
}

const MOTIFS_DEFAUT = {
  NON_ARGUMENTE: [], // les 3 options de nature restent fixes (injoignable/num erroné/non dispo)
  NON_ELIGIBLE: ["Âge client", "Besoin de financement hors offre", "Activité non éligible"],
  NON_INTERESSE: ["Offre / tarification", "Pas de besoin dans l'immédiat"]

async function chargerMotifs(categorie) {
  const defauts = MOTIFS_DEFAUT[categorie] || [];
  try {
    const data = await dvFetch(`${TABLES.motifs}?$filter=cr2c5_arw_categorie eq '${categorie}' and cr2c5_arw_actif eq true&$select=cr2c5_arw_libelle`);
    const dynamiques = (data.value || []).map(m => m.cr2c5_arw_libelle).filter(Boolean);
    return [...new Set([...defauts, ...dynamiques])];

function formatMontant(m) {
  if (m === null || m === undefined || m === "") return "-";
  return Number(m).toLocaleString('fr-FR', { maximumFractionDigits: 2 }) + " MAD";
}

function formatTelephone(numero) {
  if (!numero) return null;
  let chiffres = String(numero).replace(/\D/g, "");
  if (chiffres.length === 9) chiffres = "0" + chiffres; // ajoute le 0 initial manquant
  if (chiffres.length !== 10) return String(numero); // format inattendu, on affiche tel quel
  return `${chiffres.slice(0,4)} ${chiffres.slice(4,6)} ${chiffres.slice(6,8)} ${chiffres.slice(8,10)}`;
}

function telHref(numero) {
  if (!numero) return "";
  let chiffres = String(numero).replace(/\D/g, "");
  if (chiffres.length === 9) chiffres = "0" + chiffres;
  return chiffres;
}

function echeancesRestantes(finecheance) {
  if (!finecheance) return "-";
  const fin = new Date(finecheance);
  const maintenant = new Date();
  const mois = (fin.getFullYear() - maintenant.getFullYear()) * 12 + (fin.getMonth() - maintenant.getMonth());
  return Math.max(mois, 0);
}

function formatDateFr(d) {
  if (!d) return "-";
  return new Date(d).toLocaleDateString('fr-FR');
}

function templateClientItem(c) {
  return `
    <div class="client-item" data-id="${c.cr2c5_arw_relance_clientsid}">

      </div>

    </div>`;
}

async function enregistrerAppel(client, nature, resultat, overlay) {
  const q = sel => overlay.querySelector(sel);
  const commentaire = q("#commentaire-libre").value;

  // 1) Créer la ligne d'historique cr2c5_arw_appels
  const appelBody = {
    "cr2c5_arw_client@odata.bind": `/${TABLES.clients}(${client.cr2c5_arw_relance_clientsid})`,
    cr2c5_arw_operateur: currentUser.nom,
    cr2c5_arw_date_appel: new Date().toISOString(),
    cr2c5_arw_nature_appel: nature === "ARGUMENTE" ? 100 : 101,
    cr2c5_arw_commentaire: commentaire
  };
  if (nature === "NON_ARGUMENTE") {
    appelBody.cr2c5_arw_motif_non_argumente = q("#motif-non-argumente").value;
    if (q("#input-date-recontact").value) appelBody.cr2c5_arw_date_rdv = q("#input-date-recontact").value;
  } else {
    appelBody.cr2c5_arw_resultat_argumente = resultat;
    if (resultat === "HORS_ZONE") appelBody.cr2c5_arw_agence_reaffectee = q("#input-agence-proche").value;
    if (resultat === "NON_ELIGIBLE") {
      let motif = q("#motif-non-eligible").value;
      if (motif === "__NOUVEAU__") {
        motif = q("#input-nouveau-motif-eligible").value.trim();
        ajouterMotif("NON_ELIGIBLE", motif).catch(err => console.error("Erreur ajout motif:", err));
      }
      appelBody.cr2c5_arw_motif_non_eligibilite = motif;
    }
    if (resultat === "NON_INTERESSE") {
      let motif = q("#motif-non-interesse").value;
      if (motif === "__NOUVEAU__") {
        motif = q("#input-nouveau-motif-interesse").value.trim();
        ajouterMotif("NON_INTERESSE", motif).catch(err => console.error("Erreur ajout motif:", err));
      }
      appelBody.cr2c5_arw_motif_non_interet = motif;
    }
    if (resultat === "INTERESSE") {
      appelBody.cr2c5_arw_delai_interet = q("#delai-interet").value;
      if (q("#delai-interet").value === "IMMEDIAT") appelBody.cr2c5_arw_date_rdv = new Date(q("#input-date-rdv").value).toISOString();
    }
  }
  await dvFetch(`${TABLES.appels}`, { method: "POST", body: JSON.stringify(appelBody) });

  // 2) Mettre à jour le statut du client selon la logique métier
  const updateBody = {};
  if (nature === "NON_ARGUMENTE") {
    updateBody.cr2c5_arw_nb_tentatives = (client.cr2c5_arw_nb_tentatives || 0) + 1;
    updateBody.cr2c5_arw_statut = 12; // INJOIGNABLE / NON_DISPONIBLE
    if (q("#motif-non-argumente").value !== "NUM_ERRONE") {
      updateBody.cr2c5_arw_date_rappel_prevue = q("#input-date-recontact").value;
      updateBody.cr2c5_arw_operateur_assigne = null; // libéré, repasse dans le pool prioritaire à la date de recontact
    }
  } else if (resultat === "HORS_ZONE") {
    updateBody.cr2c5_arw_agence_reaffectee = q("#input-agence-proche").value;
    updateBody.cr2c5_arw_statut = 13; // HORS_ZONE_REAFFECTE
    updateBody.cr2c5_arw_operateur_assigne = null; // libéré pour réattribution
  } else if (resultat === "NON_ELIGIBLE" || resultat === "NON_INTERESSE") {
    updateBody.cr2c5_arw_statut = resultat === "NON_ELIGIBLE" ? 14 : 18; // CLOTURE négatif (NON_ELIGIBLE / NON_INTERESSE)
  } else if (resultat === "INTERESSE") {
    if (q("#delai-interet").value === "IMMEDIAT") {
      updateBody.cr2c5_arw_statut = 16; // RDV_FIXE
      updateBody.cr2c5_arw_date_rappel_prevue = null;
    } else {
      updateBody.cr2c5_arw_statut = 15; // INTERESSE_RAPPEL
      const mois = { "1_MOIS": 1, "2_MOIS": 2, "3_MOIS": 3 }[q("#delai-interet").value];
      const d = new Date(); d.setMonth(d.getMonth() + mois);
      updateBody.cr2c5_arw_date_rappel_prevue = d.toISOString().slice(0,10);
      updateBody.cr2c5_arw_operateur_assigne = null; // repasse dans le pool à échéance
    }
  }
  await dvFetch(`${TABLES.clients}(${client.cr2c5_arw_relance_clientsid})`, { method: "PATCH", body: JSON.stringify(updateBody) });
}

async function fetchTousClientsLeger() {
  let tous = [];
  let path = `${TABLES.clients}?$select=cr2c5_arw_direction,cr2c5_arw_agence,cr2c5_arw_statut`;
  let data = await dvFetch(path);
  tous = tous.concat(data.value || []);
  let nextLink = data["@odata.nextLink"];
  while (nextLink) {
    const token = await getToken();
    const res = await fetch(nextLink, {
      headers: { "Authorization": `Bearer ${token}`, "OData-MaxVersion": "4.0", "OData-Version": "4.0", "Accept": "application/json" }
    });
    data = await res.json();
    tous = tous.concat(data.value || []);
    nextLink = data["@odata.nextLink"];
  }
  return tous;
}

function agregerParClef(clients, clef) {
  const groupes = {};
  for (const c of clients) {
    const k = c[clef] || "Non renseigné";
    if (!groupes[k]) groupes[k] = { total: 0, rdv: 0, cloture: 0, stock: 0 };
    groupes[k].total++;
    const s = c.cr2c5_arw_statut;
    if (s === 16 || s === 17) groupes[k].rdv++;
    if (s === 14 || s === 18) groupes[k].cloture++;
    if ([10, 11, 12, 13, 15].includes(s)) groupes[k].stock++;
  }
  return Object.entries(groupes).map(([cle, v]) => ({
    cle, ...v,
    taux: (v.rdv + v.cloture) > 0 ? Math.round((v.rdv / (v.rdv + v.cloture)) * 100) : 0
  }));
}

function construireArbreSituation(clients) {
  const total = clients.length;
  const statutOf = c => c.cr2c5_arw_statut;
  const nonContacte = clients.filter(c => [10, 11].includes(statutOf(c)));
  const contacte = clients.filter(c => ![10, 11].includes(statutOf(c)));
  const nonArgumente = contacte.filter(c => statutOf(c) === 12);
  const argumente = contacte.filter(c => statutOf(c) !== 12);
  const horsZone = argumente.filter(c => statutOf(c) === 13);
  const nonEligible = argumente.filter(c => statutOf(c) === 14);
  const nonInteresse = argumente.filter(c => statutOf(c) === 18);
  const interesse = argumente.filter(c => [15, 16, 17].includes(statutOf(c)));
  const rdvFixe = interesse.filter(c => [16, 17].includes(statutOf(c)));
  const rappelProgramme = interesse.filter(c => statutOf(c) === 15);
  return { total, nonContacte, contacte, nonArgumente, argumente, horsZone, nonEligible, nonInteresse, interesse, rdvFixe, rappelProgramme };
}

function pct(n, total) { return total > 0 ? Math.round((n / total) * 100) : 0; }

function noeud(puce, label, n, total) {
  return `<div class="noeud">
    <div class="noeud-gauche"><span class="noeud-puce ${puce}"></span><span class="noeud-label">${label}</span></div>
    <div class="noeud-droite"><span class="noeud-valeur">${n.length !== undefined ? n.length : n}</span><span class="noeud-pct">(${pct(n.length !== undefined ? n.length : n, total)}%)</span></div>
  </div>`;
}

function templateArbreSituation(a) {
  return `
    <ul class="arbre" style="padding-left:0;border-left:none;">
      <li style="padding-left:0;">
        ${noeud("neutre", "Stock total chargé", a.total, a.total)}
        <ul>
          <li>
            ${noeud("attente", "Non encore contacté", a.nonContacte, a.total)}
          </li>
          <li>
            ${noeud("neutre", "Contacté", a.contacte, a.total)}
            <ul>
              <li>
                ${noeud("negatif", "Appel non argumenté (injoignable / erroné / non dispo)", a.nonArgumente, a.total)}

              <li>

                <ul>
                  <li>${noeud("attente", "Hors zone (réaffecté)", a.horsZone, a.total)}</li>

            </tr></thead>
            <tbody>
              ${parRegion.map(l => `<tr>
                <td>${l.cle}</td><td>${l.stock}</td><td>${l.rdv}</td><td>${l.cloture}</td><td>${l.taux}%</td>
              </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>

      <div class="carte">
        <h2>Top agences (par RDV fixés)</h2>
        <div style="height:${Math.max(topAgences.length * 34, 120)}px;"><canvas id="graphe-top-agences"></canvas></div>
        <div class="tableau-wrap" style="margin-top:14px;">
          <table class="donnees">
            <thead><tr>
              <th>#</th><th>Agence</th><th>RDV</th><th>Taux confirm.</th>
            </tr></thead>
            <tbody>
              ${topAgences.map((a, i) => `<tr>
                <td>${i + 1}</td><td>${a.cle}</td><td>${a.rdv}</td><td>${a.taux}%</td>
              </tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;

    new Chart(document.getElementById("graphe-top-agences"), {
      type: "bar",
      data: {
        labels: topAgences.map(a => a.cle),
        datasets: [{ label: "RDV fixés", data: topAgences.map(a => a.rdv), backgroundColor: "#e8813a", borderRadius: 4 }]
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, ticks: { precision: 0 } } }
      }
    });
  } catch (e) {
    zone.innerHTML = `<div class="msg-erreur">Erreur : ${e.message}</div>`;
  }
}

async function importerFichierClients() {
  const fichier = document.getElementById("input-fichier").files[0];
  const statutDiv = document.getElementById("statut-import");
  if (!fichier) { statutDiv.innerHTML = `<div class="msg-erreur">Sélectionnez un fichier.</div>`; return; }
  statutDiv.innerHTML = `<div class="msg-vide">Lecture du fichier...</div>`;

  const buf = await fichier.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array", cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { raw: true, defval: "" });

  let importes = 0, doublons = 0, erreurs = 0;
  for (const r of rows) {
    try {
      const body = {
        cr2c5_arw_direction: r.DIRECTION, cr2c5_arw_directeursucursale: r.DIRECTEURSUCURSALE,
        cr2c5_arw_codeagence: r.CODEAGENCE, cr2c5_arw_agence: r.AGENCE,
        cr2c5_arw_codeagentcredit: r.CODEAGENTCREDIT, cr2c5_arw_agentdecredit: r.AGENTDECREDIT,
        cr2c5_arw_numdemande: r.NUMDEMANDE, cr2c5_arw_idclient: r.IDCLIENT,
        cr2c5_arw_nomclient: r.NOMCLIENT, cr2c5_arw_prenomclient: r.PRENOMCLIENT,
        cr2c5_arw_adresse: r.ADRESSE, cr2c5_arw_gsm: String(r.GSM || ""), cr2c5_arw_cin: r.CIN,
        cr2c5_arw_age: r.AGE || r.Age || null,
        cr2c5_arw_codesousproduit: r.CODESOUSPRODUIT,
        cr2c5_arw_finecheance: r.FINECHEANCE instanceof Date ? r.FINECHEANCE.toISOString().slice(0,10) : null,
        cr2c5_arw_montantdeblocage: r.MONTANTDEBLOCAGE, cr2c5_arw_terme: r.TERME, cr2c5_arw_mntecheance: r.MNTECHEANCE,
        cr2c5_arw_activite: r["Activité"],
        cr2c5_arw_agence_origine: r.AGENCE,
        cr2c5_arw_statut: 10 // A_TRAITER
      };
      // Vérifier doublon par numéro de demande avant insertion
      const existe = await dvFetch(`${TABLES.clients}?$filter=cr2c5_arw_numdemande eq '${r.NUMDEMANDE}'&$select=cr2c5_arw_relance_clientsid`);
      if (existe.value && existe.value.length > 0) { doublons++; continue; }
      await dvFetch(`${TABLES.clients}`, { method: "POST", body: JSON.stringify(body) });
      importes++;
    } catch (e) { erreurs++; console.error(e); }
  }
  statutDiv.innerHTML = `<div class="msg-succes">Import terminé : ${importes} client(s) importé(s), ${doublons} doublon(s) ignoré(s), ${erreurs} erreur(s).</div>`;
}

/* ============================================================
   ÉCRAN DR — RDV fixés + export Excel
   ============================================================ */
async function renderEcranDR(zone) {
  zone.innerHTML = `<div class="msg-vide">Chargement des rendez-vous...</div>`;
  const filtreDirection = (currentUser.role === "dr" && currentUser.direction)
    ? ` and cr2c5_arw_direction eq '${currentUser.direction}'` : "";
  try {
    const [dataRdv, dataExportes] = await Promise.all([
      dvFetch(`${TABLES.clients}?$filter=cr2c5_arw_statut eq 16${filtreDirection}`),
      dvFetch(`${TABLES.clients}?$filter=cr2c5_arw_statut eq 17${filtreDirection}&$select=cr2c5_arw_relance_clientsid`)
    ]);
    const liste = dataRdv.value || [];
    const totalExportes = dataExportes.value?.length || 0;
    const enteteDirection = (currentUser.role === "dr" && currentUser.direction) ? ` — ${currentUser.direction}` : "";
    const tdb = `
      <div class="stat-grid">
        <div class="stat"><div class="valeur">${liste.length}</div><div class="label">RDV à transmettre${enteteDirection}</div></div>
        <div class="stat"><div class="valeur">${totalExportes}</div><div class="label">Déjà exportés (total)</div></div>
      </div>
    `;
    if (liste.length === 0) {
      zone.innerHTML = tdb + `<div class="msg-vide">Aucun rendez-vous confirmé à transmettre pour le moment.</div>`;
      return;
    }
    zone.innerHTML = tdb + `
      <div class="carte">
        <h2>Rendez-vous confirmés (${liste.length})</h2>
        <button class="btn orange" id="btn-export">Télécharger la liste (Excel)</button>
      </div>
      <div id="liste-rdv"></div>
    `;
    document.getElementById("liste-rdv").innerHTML = liste.map(c => `
      <div class="client-item">
        <div>
          <div class="nom">${c.cr2c5_arw_nomclient} ${c.cr2c5_arw_prenomclient} <span class="badge rdv">RDV</span></div>
          <div class="meta">${c.cr2c5_arw_agence} · <a class="tel-link" href="tel:${telHref(c.cr2c5_arw_gsm)}">${formatTelephone(c.cr2c5_arw_gsm) || "-"}</a></div>
        </div>
      </div>`).join("");

    document.getElementById("btn-export").addEventListener("click", async () => {
      const exportData = liste.map(c => ({
        Agence: c.cr2c5_arw_agence, Client: `${c.cr2c5_arw_nomclient} ${c.cr2c5_arw_prenomclient}`,
        GSM: formatTelephone(c.cr2c5_arw_gsm), "N° demande": c.cr2c5_arw_numdemande, "Date RDV": c.cr2c5_arw_date_rdv
      }));
      const wsExport = XLSX.utils.json_to_sheet(exportData);
      const wbExport = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wbExport, wsExport, "RDV");
      XLSX.writeFile(wbExport, `RDV_Relance_${new Date().toISOString().slice(0,10)}.xlsx`);

      // Marquer comme exportés
      for (const c of liste) {
        await dvFetch(`${TABLES.clients}(${c.cr2c5_arw_relance_clientsid})`, {
          method: "PATCH",
          body: JSON.stringify({ cr2c5_arw_statut: 17, cr2c5_arw_date_export_dr: new Date().toISOString() }) // EXPORTE_DR
        });
      }
      renderEcranDR(zone);
    });
  } catch (e) {
    zone.innerHTML = `<div class="msg-erreur">Erreur : ${e.message}</div>`;
  }
}

initAuth();
